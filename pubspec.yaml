name: wireguard_ui_client
description: Flutter client for WireGuard UI (Android and iOS).
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  animations: ^2.0.11
  cookie_jar: ^4.0.8
  dio: ^5.7.0
  dio_cookie_manager: ^3.1.1
  flutter_local_notifications: ^17.2.4
  intl: ^0.20.2
  path_provider: ^2.1.4
  provider: ^6.1.2
  qr_flutter: ^4.1.0
  shared_preferences: ^2.3.2
  passkeys: ^2.18.0
  archive: ^4.0.9
  share_plus: ^12.0.2
  firebase_core: ^4.7.0
  firebase_messaging: ^16.2.0
  workmanager: ^0.9.0+3
  url_launcher: ^6.3.2
  flutter_svg: ^2.0.17
  local_auth: ^3.0.1
  flutter_secure_storage: ^10.0.0
  encrypt: ^5.0.3
  flutter_localizations:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.4
  image: ^4.8.0

flutter_launcher_icons:
  # Opaque flatten (dart run tool/gen_launcher_icons.dart) — replaces alpha fringes / black gutters.
  image_path: assets/launcher/iconapp_legacy_mipmap.png
  remove_alpha_ios: true
  android: true
  ios: true
  adaptive_icon_background: assets/launcher/iconapp_adaptive_gradient_bg.png
  adaptive_icon_foreground: assets/launcher/iconapp_foreground_launcher.png
  adaptive_icon_foreground_inset: 0

flutter:
  generate: true
  uses-material-design: true
  assets:
    - assets/images/wireguard.svg
