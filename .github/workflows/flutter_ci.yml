name: Flutter CI

on:
  push:
    branches: [dev, main, master]
  pull_request:
    branches: [dev, main, master]

permissions:
  contents: read

jobs:
  analyze-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        # Treat only errors/warnings as failures until prefer_const infos are cleaned up.
        run: flutter analyze --no-fatal-infos

      - name: Tests
        run: flutter test
